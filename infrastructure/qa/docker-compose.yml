services:
  db:
    image: postgres:16-alpine
    networks:
      - qa_network
    environment:
      POSTGRES_DB: qadb
      POSTGRES_USER: qauser
      POSTGRES_PASSWORD: qapass
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qauser -d qadb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../../backend
    networks:
      - qa_network
    environment:
      SECRET_KEY: qa-secret-key-change-me
      DEBUG: "False"
      DB_NAME: qadb
      DB_USER: qauser
      DB_PASSWORD: qapass
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8001:8000'
    restart: on-failure
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build: ../../frontend
    networks:
      - qa_network
    ports:
      - '81:80'
    depends_on:
      - backend

networks:
  qa_network:
    driver: bridge

volumes:
  qa_postgres_data:
