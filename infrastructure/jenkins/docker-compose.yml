services:
  jenkins:
    build: .
    container_name: jenkins
    restart: always
    ports:
      - '8080:8080'
      - '50000:50000'
    environment:
      - JAVA_OPTS=-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/sijimon/projects/mydevopsapp:/home/sijimon/projects/mydevopsapp
    networks:
      - appnetwork
      - jenkins_default


networks:
  appnetwork:
    external: true
    name: infrastructure_appnetwork
  jenkins_default:
    driver: bridge

volumes:
  jenkins_home:
