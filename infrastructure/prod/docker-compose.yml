services:
  db:
    image: postgres:16-alpine
    networks:
      - prod_network
    environment:
      POSTGRES_DB: proddb
      POSTGRES_USER: produser
      POSTGRES_PASSWORD: prodpass
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U produser -d proddb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../../backend
    networks:
      - prod_network
    environment:
      SECRET_KEY: prod-secret-key-must-be-strong
      DEBUG: "False"
      DB_NAME: proddb
      DB_USER: produser
      DB_PASSWORD: prodpass
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8002:8000'
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build: ../../frontend
    networks:
      - prod_network
    ports:
      - '82:80'
    depends_on:
      - backend

networks:
  prod_network:
    driver: bridge

volumes:
  prod_postgres_data:
